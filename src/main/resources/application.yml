spring.application.name=ms-resenas
server.port=8087

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_resenas
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# URLs de otros microservicios (balanceadas por Eureka)
usuario.service.url=lb://ms-usuarios
catalogo.service.url=lb://ms-catalogo
pedido.service.url=lb://ms-pedido
storage.service.url=lb://ms-storage

